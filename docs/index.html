<script>
// ====== CONFIG ======
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8088/api'
  : 'https://img.okva.cc/api';

const CATEGORIES = [
  'AI绘画','优质小姐姐视频','头像','妹子套图','小姐姐视频',
  '手机端-man图片','手机端-动漫图片','手机端-动物图片','手机端-城市图片',
  '手机端-影视图片','手机端-情感图片','手机端-手绘图片','手机端-文字图片',
  '手机端-机械图片','手机端-游戏图片','手机端-物语图片','手机端-美女图片',
  '手机端-视觉图片','手机端-设计图片','手机端-风景图片','手机端壁纸日更',
  '王者荣耀原画壁纸','电脑端-4K图片','电脑端-你的名字图片','电脑端-动漫图片',
  '电脑端-植物图片','电脑端-美女图片','电脑端-谷歌每日图片','抖音',
  '3440X1440壁纸','cos图','cosplay图片','朋友圈背景图','表情包',
  '本人使用壁纸','喵糖映画套图'
];

let allImages = [], lightboxImages = [], lightboxIndex = 0, likes = {};

// ====== DARK MODE ======
function toggleDark() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('dark', document.documentElement.classList.contains('dark'));
}
if (localStorage.getItem('dark') === 'true' || (!localStorage.getItem('dark') && matchMedia('(prefers-color-scheme:dark)').matches)) {
  document.documentElement.classList.add('dark');
}

// ====== SIDEBAR ======
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
document.addEventListener('click', e => {
  if (window.innerWidth < 1024 && !e.target.closest('#sidebar') && !e.target.closest('button[aria-label="菜单"]')) closeSidebar();
});

// ====== NAVIGATION ======
function navigate(e, page) {
  if (e) e.preventDefault();
  document.querySelectorAll('.nav-link').forEach(l => {
    l.classList.remove('bg-pink-50','dark:bg-pink-900/30','text-pink-600','dark:text-pink-400');
  });
  const active = document.querySelector(`.nav-link[data-page="${page}"]`);
  if (active) active.classList.add('bg-pink-50','dark:bg-pink-900/30','text-pink-600','dark:text-pink-400');
  document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
  const target = document.getElementById('page-' + page);
  if (target) target.classList.remove('hidden');
  window.scrollTo({top: 0, behavior: 'smooth'});
  if (page === 'square') buildSquare();
  if (page === 'links') buildLinks();
}

// ====== FETCH ======
async function fetchImages(cat, count = 30) {
  const e = encodeURIComponent(cat);
  const r = await Promise.all([...Array(count)].map(() =>
    fetch(`${API_BASE}/AllJsonApi.php?type=${e}`).then(r => r.json()).then(d => d.url ? { url: d.url, thumb: d.url, title: cat, category: cat, count: ~~(Math.random()*30)+5 } : null).catch(() => null)
  ));
  return r.filter(Boolean);
}

// ====== CARD HTML ======
function cardHTML(img, i, small) {
  const cls = small ? 'w-1/2 sm:w-1/3 xl:w-1/6 p-1 sm:p-2' : 'w-6/12 sm:w-4/12 lg:w-3/12 2xl:w-1/5 p-1 sm:p-2 lg:p-2.5';
  return `<article class="masonry-item ${cls} group" data-id="img-${i}" data-cat="${img.category}" data-title="${img.title}" data-url="${img.url}">
    <div class="relative overflow-hidden rounded-lg bg-white dark:bg-black shadow-lg">
      <a href="#" onclick="openLightbox(event,'img-${i}')" class="block text-sm text-white">
        <img class="min-h-36 object-cover w-full transition-all duration-500 group-hover:scale-110" src="${img.url}" alt="${img.title}" loading="lazy" onerror="this.closest('article').style.display='none'">
        <div class="absolute top-2 -right-full bg-white/90 dark:bg-black/80 dark:text-white text-black py-0.5 px-2 rounded-md transition-all duration-300 group-hover:right-2 text-xs font-medium">${img.count}P</div>
        <div class="absolute inset-x-2 -bottom-full backdrop-blur-sm bg-black/50 p-2 rounded-md transition-all duration-300 group-hover:bottom-2"><div class="text-xs line-clamp-2">${img.title}</div></div>
      </a>
      <a href="#" onclick="event.stopPropagation();filterByCategory('${img.category}')" class="absolute top-2 left-2 bg-black/50 hover:bg-pink-500/80 text-white rounded-xl text-xs px-2.5 py-0.5 transition-colors">${img.category}</a>
    </div></article>`;
}

// ====== MASONRY ======
function masonryLayout() {
  const g = document.getElementById('masonry-grid'), items = g.querySelectorAll('.masonry-item');
  if (!items.length) return;
  const gap = 8, cw = g.offsetWidth, cols = cw >= 1536 ? 5 : cw >= 1024 ? 4 : cw >= 640 ? 3 : 2;
  const colW = (cw - gap*(cols-1)) / cols, hts = Array(cols).fill(0);
  items.forEach(it => {
    const mi = hts.indexOf(Math.min(...hts));
    it.style.width = colW + 'px'; it.style.left = mi*(colW+gap) + 'px'; it.style.top = hts[mi] + 'px';
    hts[mi] += colW*1.5 + gap;
  });
  g.style.height = Math.max(...hts) + 'px';
}

// ====== LOAD ======
async function loadInitial() {
  document.getElementById('masonry-grid').innerHTML = '';
  allImages = [];
  const cats = CATEGORIES.sort(() => Math.random()-0.5).slice(0, 3);
  (await Promise.all(cats.map(c => fetchImages(c, 6)))).forEach(imgs => allImages.push(...imgs));
  allImages.sort(() => Math.random()-0.5);
  renderBatch(0, allImages.length);
  loadSection('section-anime', 'AI绘画');
  loadSection('section-star', '妹子套图');
}
function renderBatch(start, count) {
  const g = document.getElementById('masonry-grid');
  for (let i = start; i < start+count && i < allImages.length; i++) g.insertAdjacentHTML('beforeend', cardHTML(allImages[i], i));
  setTimeout(masonryLayout, 200);
}
async function loadMore() {
  const btn = document.getElementById('loadMoreBtn');
  btn.textContent = '加载中…'; btn.disabled = true;
  const imgs = await fetchImages(CATEGORIES[~~(Math.random()*CATEGORIES.length)], 6);
  const prev = allImages.length; allImages.push(...imgs);
  renderBatch(prev, imgs.length);
  btn.textContent = '加载更多'; btn.disabled = false;
}
async function loadSection(id, cat) {
  const el = document.getElementById(id); if (!el) return;
  el.innerHTML = '<div class="text-center text-gray-400 text-sm py-4 w-full">加载中…</div>';
  el.innerHTML = (await fetchImages(cat, 6)).map((img, i) => cardHTML(img, i, true).replace('masonry-item', '')).join('');
}

// ====== LIGHTBOX ======
function openLightbox(e, id) {
  e.preventDefault();
  lightboxImages = [...document.querySelectorAll('[data-url]')].filter(el => el.dataset.url?.startsWith('http')).map(el => ({ url: el.dataset.url, title: el.dataset.title, category: el.dataset.cat, id: el.dataset.id || el.getAttribute('data-id') }));
  lightboxIndex = Math.max(0, lightboxImages.findIndex(img => img.id === id));
  updateLightbox();
  document.getElementById('lightbox').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}
function updateLightbox() {
  const img = lightboxImages[lightboxIndex]; if (!img) return;
  document.getElementById('lightboxImg').src = img.url;
  document.getElementById('lightboxCounter').textContent = `${lightboxIndex+1} / ${lightboxImages.length}`;
  document.getElementById('lightboxLikeCount').textContent = likes[img.id] || 0;
}
function closeLightbox(e) { if (e && e.target !== document.getElementById('lightbox')) return; document.getElementById('lightbox').classList.add('hidden'); document.body.style.overflow = ''; }
function lightboxNext() { lightboxIndex = (lightboxIndex+1) % lightboxImages.length; updateLightbox(); }
function lightboxPrev() { lightboxIndex = (lightboxIndex-1+lightboxImages.length) % lightboxImages.length; updateLightbox(); }
function likeCurrent() {
  const img = lightboxImages[lightboxIndex]; if (!img) return;
  likes[img.id] = (likes[img.id]||0)+1;
  document.getElementById('lightboxLikeCount').textContent = likes[img.id];
  document.getElementById('lightboxLike').classList.add('heart-anim');
  setTimeout(() => document.getElementById('lightboxLike').classList.remove('heart-anim'), 800);
}

// ====== FILTER ======
function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#masonry-grid .masonry-item').forEach(item => {
    item.style.display = (!q || (item.dataset.title||'').toLowerCase().includes(q) || (item.dataset.cat||'').toLowerCase().includes(q)) ? '' : 'none';
  });
  setTimeout(masonryLayout, 100);
}
function filterByCategory(cat) { document.getElementById('searchInput').value = cat; filterCards(); }
function randomPost() {
  const v = [...document.querySelectorAll('[data-url]')].filter(el => el.style.display !== 'none' && el.dataset.url?.startsWith('http'));
  if (v.length) openLightbox(new Event('click'), v[~~(Math.random()*v.length)].getAttribute('data-id'));
}

// ====== SQUARE ======
async function buildSquare() {
  const colors = ['from-pink-400 to-rose-500','from-violet-400 to-purple-500','from-blue-400 to-cyan-500','from-emerald-400 to-teal-500','from-amber-400 to-orange-500'];
  const cats = CATEGORIES.slice(0, 5);
  document.getElementById('bannerSlides').innerHTML = cats.map((c, i) => `<div class="absolute inset-0 transition-opacity duration-700 ${i===0?'opacity-100':'opacity-0'}"><div class="h-full bg-gradient-to-r ${colors[i]} flex items-center justify-center"><span class="text-white text-2xl sm:text-4xl font-bold">${c}</span></div></div>`).join('');
  let bi = 0;
  setInterval(() => {
    document.querySelectorAll('#bannerSlides > div').forEach((d, i) => { d.classList.toggle('opacity-100', i===(bi+1)%cats.length); d.classList.toggle('opacity-0', i!==(bi+1)%cats.length); });
    bi = (bi+1)%cats.length;
  }, 3000);
  document.getElementById('squareTagFilter').innerHTML = '<button onclick="filterSquare(\'all\')" class="px-4 py-1.5 rounded-full bg-pink-500 text-white text-sm font-medium sq-tag">全部</button>' +
    CATEGORIES.slice(0, 16).map(c => `<button onclick="filterSquare('${c}')" class="px-4 py-1.5 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 hover:border-pink-300 text-sm sq-tag">${c}</button>`).join('');
  renderSquare(await fetchImages(CATEGORIES[~~(Math.random()*CATEGORIES.length)], 12));
}
function renderSquare(imgs) {
  document.getElementById('squareGrid').innerHTML = imgs.map((img, i) => cardHTML(img, i).replace('masonry-item', '')).join('');
}
async function filterSquare(cat) {
  document.querySelectorAll('.sq-tag').forEach(b => {
    const active = b.textContent === cat || (cat === 'all' && b.textContent === '全部');
    b.className = active ? 'px-4 py-1.5 rounded-full bg-pink-500 text-white text-sm font-medium sq-tag' : 'px-4 py-1.5 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 hover:border-pink-300 text-sm sq-tag';
  });
  renderSquare(cat === 'all' ? await fetchImages(CATEGORIES[~~(Math.random()*CATEGORIES.length)], 12) : await fetchImages(cat, 12));
}

// ====== LINKS ======
function buildLinks() {
  document.getElementById('linksList').innerHTML = [
    { name: 'Hefollo 图库', url: 'https://hefollo.com', desc: '高质量随机图片API' },
    { name: '惜染工具箱', url: 'https://meshbit.github.io/my-toolbox/', desc: '98个在线实用工具' },
    { name: 'GitHub', url: 'https://github.com/meshbit/image-station', desc: '本站开源仓库' },
    { name: 'API 文档', url: 'https://api.hefollo.com', desc: 'Hefollo 图库API接口' }
  ].map(l => `<a href="${l.url}" target="_blank" class="flex items-center gap-4 py-4 px-4 border border-gray-100 dark:border-gray-700 rounded-xl mb-3 hover:shadow-md hover:border-pink-200 transition-all group">
    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-pink-100 to-violet-100 dark:from-pink-900/30 dark:to-violet-900/30 flex items-center justify-center text-lg shrink-0">🔗</div>
    <div class="min-w-0"><div class="font-medium group-hover:text-pink-500 transition-colors">${l.name}</div><div class="text-xs text-gray-400">${l.desc}</div></div>
    <svg class="w-4 h-4 text-gray-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg></a>`).join('');
}

// ====== INFINITE SCROLL ======
setTimeout(() => {
  const io = new IntersectionObserver(e => {
    if (e[0].isIntersecting && !document.getElementById('page-home').classList.contains('hidden')) loadMore();
  }, { threshold: 0.1 });
  const btn = document.getElementById('loadMoreBtn'); if (btn) io.observe(btn);
}, 2000);

// ====== KEYBOARD & RESIZE ======
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').classList.contains('hidden')) return;
  if (e.key === 'ArrowRight') lightboxNext();
  if (e.key === 'ArrowLeft') lightboxPrev();
  if (e.key === 'Escape') closeLightbox();
});
let rt;
window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(masonryLayout, 300); });

// ====== INIT ======
loadInitial();
</script>
</body>
