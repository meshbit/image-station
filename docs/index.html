<script>
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:8088/api' : 'https://img.okva.cc/api';
const CATEGORIES = ['AI绘画','优质小姐姐视频','头像','妹子套图','小姐姐视频','手机端-man图片','手机端-动漫图片','手机端-动物图片','手机端-城市图片','手机端-影视图片','手机端-情感图片','手机端-手绘图片','手机端-文字图片','手机端-机械图片','手机端-游戏图片','手机端-物语图片','手机端-美女图片','手机端-视觉图片','手机端-设计图片','手机端-风景图片','手机端壁纸日更','王者荣耀原画壁纸','电脑端-4K图片','电脑端-你的名字图片','电脑端-动漫图片','电脑端-植物图片','电脑端-美女图片','电脑端-谷歌每日图片','抖音','3440X1440壁纸','cos图','cosplay图片','朋友圈背景图','表情包','本人使用壁纸','喵糖映画套图'];
let allImages = [], lightboxImages = [], lightboxIndex = 0, likes = {}, imgCache = {};

function toggleDark() { document.documentElement.classList.toggle('dark'); localStorage.setItem('dark', document.documentElement.classList.contains('dark')); }
if (localStorage.getItem('dark') === 'true' || (!localStorage.getItem('dark') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');

function openLoginModal() { document.getElementById('loginModal').classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
function closeLoginModal() { document.getElementById('loginModal').classList.add('hidden'); document.body.style.overflow = ''; }

function toggleMobileSearch() {
  const wrap = document.getElementById('searchWrap');
  if (wrap.classList.contains('hidden')) {
    wrap.classList.remove('hidden');
    document.getElementById('searchInput').focus();
  } else {
    wrap.classList.add('hidden');
  }
}

function toggleSidebar() { const sb = document.getElementById('sidebar'), ov = document.getElementById('sidebarOverlay'); sb.classList.toggle('-translate-x-full'); sb.classList.toggle('translate-x-0'); ov.classList.toggle('hidden'); }
function closeSidebar() { if (window.innerWidth >= 1024) return; document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('sidebar').classList.remove('translate-x-0'); document.getElementById('sidebarOverlay').classList.add('hidden'); }

function navigate(e, page) {
  if (e) e.preventDefault();
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('bg-gray-100','dark:bg-white/10'));
  const a = document.querySelector(`.nav-link[data-page="${page}"]`);
  if (a) a.classList.add('bg-gray-100','dark:bg-white/10');
  document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
  const t = document.getElementById('page-' + page); if (t) t.classList.remove('hidden');
  window.scrollTo({top: 0, behavior: 'smooth'});
  pjaxStart();
  setTimeout(() => {
    if (page === 'square') buildSquare();
    if (page === 'links') buildLinks();
    if (page === 'timeline') buildTimeline();
    pjaxDone();
  }, 300);
}

async function fetchImagesCached(cat, count = 4) {
  if (imgCache[cat] && imgCache[cat].length >= count) return imgCache[cat].slice(0, count);
  const e = encodeURIComponent(cat);
  const results = (await Promise.all([...Array(count)].map(() =>
    fetch(`${API_BASE}/AllJsonApi.php?type=${e}`).then(r => r.json()).then(d => {
      if (!d.url) return null;
      return { url: d.url, thumb: d.url, title: cat, category: cat, count: ~~(Math.random()*30)+5 };
    }).catch(() => null)
  ))).filter(Boolean);
  imgCache[cat] = results;
  return results;
}

function cardHTML(img, i, small) {
  const cls = small ? 'w-1/2 sm:w-1/3 xl:w-1/6 p-2 xl:p-2.5' : 'w-6/12 sm:w-4/12 lg:w-3/12 2xl:w-1/5 p-2 lg:p-2.5 xl:p-3 2xl:p-3.5';
  return `<article class="masonry-item ${cls} group" data-id="img-${i}" data-cat="${img.category}" data-title="${img.title}" data-url="${img.url}">
    <div class="relative overflow-hidden">
      <a href="#" onclick="openLightbox(event,'img-${i}')" class="text-sm text-white">
        <div class="rounded-lg overflow-hidden bg-white dark:bg-black shadow-lg">
          <img class="min-h-36 object-cover w-full transition-all duration-500 group-hover:scale-110" src="${img.url}" alt="${img.title}" loading="lazy" onerror="this.closest('article').style.display='none'">
        </div>
        <div class="absolute top-2 -right-full bg-white/90 text-black p-1 rounded-md transition-all duration-300 group-hover:right-2 text-xs"><span>${img.count}P</span></div>
        <div class="absolute inset-x-2 -bottom-full backdrop-blur-sm bg-black/50 p-2 rounded-md transition-all duration-300 group-hover:bottom-2"><div class="line-clamp-2 text-xs">${img.title}</div></div>
      </a>
      <a href="#" onclick="event.stopPropagation();filterByCategory('${img.category}')" class="absolute top-2 left-2 bg-black/50 text-white rounded-xl text-xs px-3 py-1">${img.category}</a>
    </div></article>`;
}

function masonryLayout() {
  const g = document.getElementById('masonry-grid'), items = g.querySelectorAll('.masonry-item');
  if (!items.length) return;
  const gap = 8, cw = g.offsetWidth, cols = cw >= 1536 ? 5 : cw >= 1024 ? 4 : cw >= 640 ? 3 : 2;
  const colW = (cw - gap*(cols-1)) / cols, hts = Array(cols).fill(0);
  items.forEach(it => { const ih = colW * 1.5, mi = hts.indexOf(Math.min(...hts)); it.style.width = colW + 'px'; it.style.left = mi*(colW+gap) + 'px'; it.style.top = hts[mi] + 'px'; hts[mi] += ih + gap; });
  g.style.height = Math.max(...hts) + 'px';
}

async function loadInitial() {
  const g = document.getElementById('masonry-grid');
  g.innerHTML = '<div class="text-center text-gray-400 py-12">加载中…</div>'; allImages = [];
  const cats = CATEGORIES.sort(() => Math.random()-0.5).slice(0, 3);
  // Stream-render: render each category's images as they arrive
  let idx = 0;
  await Promise.all(cats.map(async c => {
    const imgs = await fetchImagesCached(c, 4);
    imgs.forEach(img => { img._idx = idx++; allImages.push(img); });
    const html = imgs.map((img, i) => cardHTML(img, img._idx)).join('');
    if (g.firstChild && g.firstChild.textContent === '加载中…') g.innerHTML = '';
    g.insertAdjacentHTML('beforeend', html);
    setTimeout(masonryLayout, 100);
  }));
  if (!allImages.length) g.innerHTML = '<div class="text-center text-gray-400 py-12">暂无图片，请稍后刷新</div>';
}
function renderBatch(start, count) { const g = document.getElementById('masonry-grid'); for (let i = start; i < start+count && i < allImages.length; i++) g.insertAdjacentHTML('beforeend', cardHTML(allImages[i], i)); setTimeout(masonryLayout, 200); }
async function loadMore() { const btn = document.getElementById('loadMoreBtn'); btn.textContent = '加载中…'; btn.disabled = true; const imgs = await fetchImagesCached(CATEGORIES[~~(Math.random()*CATEGORIES.length)], 4); const prev = allImages.length; imgs.forEach(img => { img._idx = prev + allImages.push(img) - 1; }); renderBatch(prev, imgs.length); btn.textContent = '加载更多'; btn.disabled = false; }

function openLightbox(e, id) { e.preventDefault(); lightboxImages = [...document.querySelectorAll('[data-url]')].filter(el => el.dataset.url?.startsWith('http')).map(el => ({ url: el.dataset.url, title: el.dataset.title, cat: el.dataset.cat, id: el.dataset.id || el.getAttribute('data-id') })); lightboxIndex = Math.max(0, lightboxImages.findIndex(img => img.id === id)); updateLightbox(); document.getElementById('lightbox').classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
function updateLightbox() { const img = lightboxImages[lightboxIndex]; if (!img) return; document.getElementById('lightboxImg').src = img.url; document.getElementById('lightboxCounter').textContent = `${lightboxIndex+1} / ${lightboxImages.length}`; document.getElementById('lightboxLikeCount').textContent = likes[img.id] || 0; }
function closeLightbox(e) { if (e && e.target !== document.getElementById('lightbox')) return; document.getElementById('lightbox').classList.add('hidden'); document.body.style.overflow = ''; }
function lightboxNext() { lightboxIndex = (lightboxIndex+1) % lightboxImages.length; updateLightbox(); }
function lightboxPrev() { lightboxIndex = (lightboxIndex-1+lightboxImages.length) % lightboxImages.length; updateLightbox(); }
function likeCurrent() { const img = lightboxImages[lightboxIndex]; if (!img) return; likes[img.id] = (likes[img.id]||0)+1; document.getElementById('lightboxLikeCount').textContent = likes[img.id]; document.getElementById('lightboxLike').classList.add('heart-anim'); setTimeout(() => document.getElementById('lightboxLike').classList.remove('heart-anim'), 800); }

function filterCards() { const q = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('#masonry-grid .masonry-item').forEach(item => { item.style.display = (!q || (item.dataset.title||'').toLowerCase().includes(q) || (item.dataset.cat||'').toLowerCase().includes(q)) ? '' : 'none'; }); setTimeout(masonryLayout, 100); }
function filterByCategory(cat) { document.getElementById('searchInput').value = cat; filterCards(); }
function randomPost() { const v = [...document.querySelectorAll('[data-url]')].filter(el => el.style.display !== 'none' && el.dataset.url?.startsWith('http')); if (v.length) openLightbox(new Event('click'), v[~~(Math.random()*v.length)].getAttribute('data-id')); }

async function buildSquare() { document.getElementById('bannerSlides').innerHTML = ['from-pink-400 to-rose-500','from-violet-400 to-purple-500','from-blue-400 to-cyan-500','from-emerald-400 to-teal-500','from-amber-400 to-orange-500'].map((c, i) => `<div class="absolute inset-0 transition-opacity duration-700 ${i===0?'opacity-100':'opacity-0'}"><div class="h-full bg-gradient-to-r ${c} flex items-center justify-center"><span class="text-white text-2xl sm:text-4xl font-bold">${CATEGORIES[i]}</span></div></div>`).join(''); let bi = 0; setInterval(() => { document.querySelectorAll('#bannerSlides > div').forEach((d, i) => { d.classList.toggle('opacity-100', i===(bi+1)%5); d.classList.toggle('opacity-0', i!==(bi+1)%5); }); bi = (bi+1)%5; }, 3000); document.getElementById('squareTagFilter').innerHTML = '<button onclick="filterSquare(\'all\')" class="px-4 py-1.5 rounded-full bg-sky-500 text-white text-sm font-medium sq-tag">全部</button>' + CATEGORIES.slice(0, 16).map(c => `<button onclick="filterSquare('${c}')" class="px-4 py-1.5 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 hover:border-sky-300 text-sm sq-tag">${c}</button>`).join(''); renderSquare(await fetchImagesCached(CATEGORIES[~~(Math.random()*CATEGORIES.length)], 8)); }
function renderSquare(imgs) { document.getElementById('squareGrid').innerHTML = imgs.map((img, i) => cardHTML(img, i).replace('masonry-item', '')).join(''); }
async function filterSquare(cat) { document.querySelectorAll('.sq-tag').forEach(b => { const a = b.textContent === cat || (cat === 'all' && b.textContent === '全部'); b.className = a ? 'px-4 py-1.5 rounded-full bg-sky-500 text-white text-sm font-medium sq-tag' : 'px-4 py-1.5 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 hover:border-sky-300 text-sm sq-tag'; }); renderSquare(cat === 'all' ? await fetchImagesCached(CATEGORIES[~~(Math.random()*CATEGORIES.length)], 8) : await fetchImagesCached(cat, 8)); }
function buildLinks() { document.getElementById('linksList').innerHTML = [{ name: 'Hefollo 图库', url: 'https://hefollo.com', desc: '高质量随机图片API' },{ name: '惜染工具箱', url: 'https://meshbit.github.io/my-toolbox/', desc: '98个在线实用工具' },{ name: 'GitHub', url: 'https://github.com/meshbit/image-station', desc: '本站开源仓库' },{ name: 'API 文档', url: 'https://api.hefollo.com', desc: 'Hefollo 图库API接口' }].map(l => `<a href="${l.url}" target="_blank" class="flex items-center gap-4 py-4 px-4 border border-gray-100 dark:border-gray-700 rounded-xl mb-3 hover:shadow-md hover:border-pink-200 transition-all group"><div class="w-10 h-10 rounded-lg bg-gradient-to-br from-pink-100 to-violet-100 dark:from-pink-900/30 dark:to-violet-900/30 flex items-center justify-center text-lg shrink-0">🔗</div><div class="min-w-0"><div class="font-medium group-hover:text-pink-500 transition-colors">${l.name}</div><div class="text-xs text-gray-400">${l.desc}</div></div><svg class="w-4 h-4 text-gray-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg></a>`).join(''); }

/* PJAX progress bar */
function pjaxStart() { const b = document.getElementById('pjax-bar'); b.style.opacity = '1'; b.style.width = '0'; requestAnimationFrame(() => { b.classList.add('loading'); }); }
function pjaxDone() { const b = document.getElementById('pjax-bar'); b.classList.remove('loading'); b.classList.add('done'); setTimeout(() => { b.classList.remove('done'); b.style.width = '0'; b.style.opacity = '1'; }, 600); }

/* Timeline page */
async function buildTimeline() {
  const el = document.getElementById('timelineList');
  el.innerHTML = '<div class="text-center text-gray-400 py-12">加载时间轴…</div>';
  // Parallel fetch all categories
  const all = await Promise.all(CATEGORIES.slice(0, 12).map(async cat => ({
    cat,
    imgs: await fetchImagesCached(cat, 2)
  })));
  const now = new Date();
  let html = '';
  for (let m = 5; m >= 0; m--) {
    const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
    const label = d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
    const groupImgs = all.filter((_, i) => i % 6 === m).flatMap(g => g.imgs);
    if (!groupImgs.length) continue;
    html += '<div class="timeline-item pb-8"><div class="timeline-dot"></div><div class="text-lg font-bold mb-3">' + label + '</div><div class="grid grid-cols-2 sm:grid-cols-3 gap-3">';
    groupImgs.forEach((img, i) => {
      const id = 'tl-' + m + '-' + i;
      html += '<a href="#" onclick="openLightbox(event,\'' + id + '\')" class="rounded-lg overflow-hidden block shadow hover:shadow-lg transition-shadow group/card" data-id="' + id + '" data-url="' + img.url + '" data-title="' + img.category + '"><div class="aspect-square bg-gray-100 dark:bg-gray-800 relative overflow-hidden"><img src="' + img.url + '" loading="lazy" class="w-full h-full object-cover group-hover/card:scale-110 transition-transform duration-500" onerror="this.parentElement.parentElement.style.display=\'none\'"><div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/70 to-transparent p-2"><span class="text-white text-xs line-clamp-1">' + img.category + '</span></div></div></a>';
    });
    html += '</div></div>';
  }
  el.innerHTML = html || '<div class="text-center text-gray-400 py-12">暂无归档内容</div>';
}

setTimeout(() => { const io = new IntersectionObserver(e => { if (e[0].isIntersecting && !document.getElementById('page-home').classList.contains('hidden')) loadMore(); }, { threshold: 0.1 }); const btn = document.getElementById('loadMoreBtn'); if (btn) io.observe(btn); }, 2000);
document.addEventListener('keydown', e => { if (document.getElementById('lightbox').classList.contains('hidden')) return; if (e.key === 'ArrowRight') lightboxNext(); if (e.key === 'ArrowLeft') lightboxPrev(); if (e.key === 'Escape') closeLightbox(); });
let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(masonryLayout, 300); });
loadInitial();
</script>
