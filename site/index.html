<style>
  :root {
    --bg: #0a0a0f;
    --sidebar: #0d0d15;
    --card-bg: #141420;
    --text: #e0e0e0;
    --text-dim: #7a7a8a;
    --accent: #7c3aed;
    --accent2: #a78bfa;
    --border: #1e1e30;
    --hover: #1a1a2e;
    --radius: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --progress: #7c3aed;
    --like: #ef4444;
  }
  [data-theme="light"] {
    --bg: #f5f5f7;
    --sidebar: #ffffff;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --border: #e5e7eb;
    --hover: #f3f4f6;
    --shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* === PJAX Progress Bar === */
  #pjax-bar {
    position: fixed; top:0; left:0; height:3px;
    background: var(--progress);
    z-index: 9999;
    width: 0;
    transition: width 0.3s ease;
  }
  #pjax-bar.loading { width: 70%; transition: width 2s ease; }
  #pjax-bar.done { width: 100%; transition: width 0.2s ease; opacity:0; }

  /* === Sidebar === */
  .sidebar {
    position: fixed; left:0; top:0; bottom:0;
    width: 240px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 100;
    overflow-y: auto;
    transition: transform 0.3s, background 0.3s;
  }
  .sidebar-logo {
    padding: 20px;
    font-size: 1.3rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-nav {
    flex:1; padding: 0 12px;
  }
  .sidebar-nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    color: var(--text-dim); text-decoration: none;
    font-size: 0.9rem; transition: all 0.2s;
    margin-bottom: 2px;
    cursor: pointer;
  }
  .sidebar-nav a:hover, .sidebar-nav a.active {
    background: var(--hover); color: var(--accent2);
  }
  .sidebar-nav a.active { font-weight: 600; }
  .sidebar-section {
    padding: 16px 12px 8px;
    font-size: 0.7rem; text-transform: uppercase;
    color: var(--text-dim); letter-spacing: 1px;
    opacity: 0.6;
  }
  .tag-cloud {
    padding: 0 12px 12px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .tag {
    padding: 3px 10px; border-radius: 12px;
    font-size: 0.7rem; background: var(--hover);
    color: var(--text-dim); cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tag:hover, .tag.active { border-color: var(--accent); color: var(--accent2); }
  .sidebar-bottom {
    padding: 12px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.8rem; color: var(--text-dim);
  }
  .theme-toggle {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--hover); color: var(--text);
    cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  /* === Main === */
  .main {
    margin-left: 240px; flex:1;
    display: flex; flex-direction: column;
    min-height: 100vh;
  }
  .topbar {
    position: sticky; top:0; z-index:50;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;

  .btn {

    font-size: 0.8rem; color: var(--text-dim);
    padding: 4px 12px; background: var(--hover);

    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a1030, #0d0d20);
  }
  .banner-slide {
    position: absolute; inset:0;
    opacity: 0; transition: opacity 1s;
    display: flex; align-items: center; justify-content: center;
  }
  .banner-slide.active { opacity: 0.3; }
  .banner-text {
    position: relative; z-index:2;
    text-align: center;
  }
  .banner-text h1 {
    font-size: 2.2rem; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #7c3aed, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .banner-text p {
    font-size: 1rem; color: var(--text-dim);
  }
  .banner-dots {
    position: absolute; bottom: 16px;
    display: flex; gap: 8px; z-index: 3;
  }
  .banner-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer; transition: all 0.3s;
  }
  .banner-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

  /* === Masonry Grid === */
  .gallery-section { padding: 20px 24px; }
  .section-title {
    font-size: 1.1rem; font-weight: 700;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;

  .masonry {
    column-count: 4; column-gap: 16px;

  @media (max-width: 1200px) { .masonry { column-count: 3; } }
  @media (max-width: 900px) { .masonry { column-count: 2; } }
  @media (max-width: 600px) { .masonry { column-count: 2; column-gap: 8px; } }

  .card {
    break-inside: avoid;
    margin-bottom: 16px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card-bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent); }
  .card img, .card video {
    width: 100%; display: block;
    transition: transform 0.4s;
  }
  .card:hover img { transform: scale(1.05); }
  .card-info {
    position: absolute; bottom:0; left:0; right:0;
    padding: 40px 16px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    opacity: 0; transition: opacity 0.3s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card:hover .card-info { opacity: 1; }
  .card-tag {
    font-size: 0.7rem; color: #ccc;
    background: rgba(124,58,237,0.4);
    padding: 2px 8px; border-radius: 10px;
  }
  .like-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none; color: #fff; cursor: pointer;
    font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .like-btn:hover { background: rgba(255,255,255,0.2); }
  .like-btn.liked { color: var(--like); animation: heartBeat 0.6s ease; }
  @keyframes heartBeat {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); }
    60% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }

  /* === Timeline === */
  .timeline {
    padding: 24px;
    position: relative;
  }
  .timeline::before {
    content: ''; position: absolute;
    left: 40px; top:0; bottom:0;
    width: 2px; background: var(--border);
  }
  .timeline-item {
    display: flex; gap: 20px;
    margin-bottom: 32px;
    position: relative;
  }
  .timeline-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--bg);
    flex-shrink: 0;
    margin-top: 4px;
    margin-left: 34px;
    z-index: 1;
  }
  .timeline-content h3 {
    font-size: 1rem; margin-bottom: 8px;
  }
  .timeline-content .mini-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .mini-grid img {
    width: 100%; border-radius: 8px;
    cursor: pointer; transition: transform 0.2s;
  }
  .mini-grid img:hover { transform: scale(1.05); }

  /* === Friend Links === */
  .friend-links {
    padding: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .friend-card {
    padding: 20px; border-radius: var(--radius);
    background: var(--card-bg);
    border: 1px solid var(--border);
    text-decoration: none; color: var(--text);
    transition: all 0.3s;
    display: flex; align-items: center; gap: 12px;
  }
  .friend-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .friend-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; color: #fff; font-weight: 700;
    flex-shrink: 0;
  }
  .friend-info h4 { font-size: 0.9rem; }
  .friend-info p { font-size: 0.75rem; color: var(--text-dim); }

  /* === Lightbox === */
  .lightbox {
    display: none; position: fixed; inset:0; z-index:1000;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(10px);
    justify-content: center; align-items: center;
    cursor: pointer;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .lightbox.open { display: flex; }
  .lightbox img, .lightbox video {
    max-width: 92vw; max-height: 92vh;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(124,58,237,0.2);

  @keyframes zoomIn { from { transform: scale(0.9); opacity:0; } to { transform:scale(1); opacity:1; } }
  .lb-close {
    position: absolute; top:20px; right:24px;
    font-size: 1.5rem; color: #fff;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: rgba(255,255,255,0.08);
    cursor: pointer; z-index:1001; transition: background 0.2s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.2); }
  .lb-nav {
    position: absolute; top:50%; transform:translateY(-50%);
    font-size: 2rem; color: #fff;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: rgba(255,255,255,0.06);
    cursor: pointer; z-index:1001; user-select: none;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.2); }
  .lb-prev { left: 16px; }
  .lb-next { right: 16px; }
  .lb-counter {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-size: 0.85rem;
  }

  /* === Toast === */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--card-bg); border: 1px solid var(--border);
    padding: 10px 24px; border-radius: 8px;
    font-size: 0.85rem; z-index: 2000;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* === Mobile === */
  .menu-btn {
    display: none;
    position: fixed; top:12px; left:12px; z-index:200;

    background: var(--sidebar); color: var(--text);

  }
  .sidebar-overlay {
    display: none;
    position: fixed; inset:0; z-index:99;
    background: rgba(0,0,0,0.5);
  }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .main { margin-left: 0; }
    .menu-btn { display: flex; align-items: center; justify-content: center; }
    .topbar { padding: 12px 12px 12px 56px; }
    .banner { height: 180px; }
    .banner-text h1 { font-size: 1.4rem; }
    .masonry { column-count: 2; }
    .friend-links { grid-template-columns: 1fr; }
  }

  /* === Skeleton loading === */
  .skeleton { background: linear-gradient(90deg, var(--hover) 25%, var(--border) 50%, var(--hover) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  .empty-state {
    text-align: center; padding: 80px 24px; color: var(--text-dim);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease; }

  .hidden { display: none !important; }
</style>
</head>

<script>
const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? '/api/jsonapi.php' : 'https://img.okva.cc/api/jsonapi.php';

const CATS = ["3440X1440壁纸","AI绘画","AI绘画自生成","cnmbz.com网站图片","cosplay图片","cosplay视频","cos图","代码","优质小姐姐视频","喵糖映画套图","头像","妹子套图","小姐姐横屏视频","小姐姐竖屏视频","小姐姐视频","快手小姐姐视频","手机端-man图片","手机端-动漫图片","手机端-动物图片","手机端-城市图片","手机端-影视图片","手机端-情感图片","手机端-手绘图片","手机端-文字图片","手机端-机械图片","手机端-游戏图片","手机端-物语图片","手机端-美女图片","手机端-视觉图片","手机端壁纸日更","抖音","抖音小姐姐视频","朋友圈背景图","本人使用壁纸","王者荣耀原画壁纸","电脑端-4K图片","电脑端-你的名字图片","电脑端-动漫图片","电脑端-植物图片","电脑端-美女图片","电脑端-谷歌每日图片","表情包"];
const HOT_CATS = ["电脑端-4K图片","AI绘画","cosplay图片","手机端-动漫图片","手机端-美女图片","3440X1440壁纸"];

const FRIENDS = [
  {name:"hefollo 图库",desc:"随机高清图片API",url:"https://hefollo.com/",avatar:"H"},
  {name:"惜染图库镜像",desc:"本站 xiranimg.com",url:"https://xiranimg.com",avatar:"X"},
  {name:"在线工具箱",desc:"98个实用在线工具",url:"https://meshbit.github.io/my-toolbox/",avatar:"T"},
  {name:"盘搜",desc:"网盘资源搜索引擎",url:"https://pan.okva.cc",avatar:"P"},
];

let allImages = [], lightboxIdx = -1, currentCat = null, currentPage = 'gallery', loading = false;
let liked = new Set();

// === Init ===
(function() {
  buildTagCloud();
  initBanner();
  initFriends();
  loadCategoryBatch(HOT_CATS, 3, document.getElementById('masonry'));
})();

function buildTagCloud() {
  const cloud = document.getElementById('tagCloud');
  CATS.forEach(cat => {
    const t = document.createElement('span');
    t.className = 'tag'; t.textContent = cat;
    t.onclick = () => { filterCategory(cat); if (window.innerWidth < 768) toggleSidebar(); };
    cloud.appendChild(t);
  });
}

function initBanner() {
  const dots = document.getElementById('bannerDots');
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('span');
    d.className = 'banner-dot' + (i === 0 ? ' active' : '');
    d.onclick = () => switchBanner(i);
    dots.appendChild(d);
  }
  // Load banner images
  ['AI绘画','电脑端-4K图片','cosplay图片'].forEach((cat, i) => {
    fetchImage(cat).then(url => {
      if (url) {
        const slide = document.querySelectorAll('.banner-slide')[i];
        slide.style.backgroundImage = `url(${url})`;
        slide.style.backgroundSize = 'cover';
        slide.style.backgroundPosition = 'center';
      }
    });
  });
  setInterval(() => {
    const cur = document.querySelector('.banner-slide.active');
    const idx = Array.from(cur.parentElement.children).filter(c=>c.classList.contains('banner-slide')).indexOf(cur);
    switchBanner((idx + 1) % 3);
  }, 5000);
}

function switchBanner(i) {
  document.querySelectorAll('.banner-slide').forEach((s, j) => s.classList.toggle('active', j===i));
  document.querySelectorAll('.banner-dot').forEach((d, j) => d.classList.toggle('active', j===i));
}

function initFriends() {
  const container = document.getElementById('friendLinks');
  FRIENDS.forEach(f => {
    container.innerHTML += `
      <a href="${f.url}" target="_blank" class="friend-card">
        <span class="friend-avatar">${f.avatar}</span>
        <div class="friend-info"><h4>${f.name}</h4><p>${f.desc}</p></div>
      </a>`;
  });
}

// === Navigation ===
function navTo(page) {
  const loader = document.getElementById('pjax-bar');
  loader.classList.add('loading');
  setTimeout(() => { loader.classList.remove('loading'); loader.classList.add('done'); setTimeout(()=>loader.classList.remove('done'),300); }, 200);

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));

  currentPage = page;
  if (page === 'gallery') document.getElementById('topbar').classList.remove('hidden');
  else document.getElementById('topbar').classList.add('hidden');

  if (page === 'random') loadRandomPage();
  if (page === 'timeline') buildTimeline();
  if (page === 'friends') {} // friends already built
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

// === API ===
async function fetchImage(cat) {
  try {
    const r = await fetch(`${API_BASE}?type=${encodeURIComponent(cat)}`);
    return (await r.json()).url || null;
  } catch { return null; }
}

async function loadCategoryBatch(cats, perCat, container) {
  if (loading) return;
  loading = true;
  showSkeletons(container, cats.length * perCat);

  const promises = [];
  cats.forEach(cat => { for (let i=0;i<perCat;i++) promises.push(fetchImage(cat)); });
  const results = await Promise.allSettled(promises);
  const urls = results.filter(r => r.status === 'fulfilled' && r.value).map(r => r.value);

  loading = false;
  clearSkeletons(container);
  allImages.push(...urls.map((url, i) => ({url, cat: cats[Math.floor(i/perCat)]})));
  renderCards(urls.map((url, i) => ({url, cat: cats[Math.floor(i/perCat)]})), container);
  updateCount();
}

async function loadMore() {
  const container = currentPage === 'random' ? document.getElementById('randomMasonry') : document.getElementById('masonry');
  const cats = currentCat ? [currentCat] : (currentPage === 'random' ? CATS : HOT_CATS);
  await loadCategoryBatch(cats, 4, container);
}

function filterCategory(cat) {
  currentCat = cat;
  document.querySelectorAll('.tag').forEach(t => t.classList.toggle('active', t.textContent === cat));
  const container = document.getElementById('masonry');
  container.innerHTML = '';
  allImages = [];
  loadCategoryBatch([cat], 8, container);
  navTo('gallery');
}

// === Render ===
function renderCards(items, container) {
  items.forEach(item => {
    const isVideo = /\.(mp4|webm|mov)$/i.test(item.url);
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = (e) => { if (!e.target.closest('.like-btn')) openLB(allImages.indexOf(item)); };

    if (isVideo) {
      const vid = document.createElement('video'); vid.src = item.url; vid.preload = 'metadata'; card.appendChild(vid);
    } else {
      const img = document.createElement('img');
      img.src = item.url; img.loading = 'lazy';
      img.onerror = function() { this.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23141420" width="200" height="200"/><text y="100" x="100" text-anchor="middle" fill="%23555" font-size="16">🖼</text></svg>'; };
      card.appendChild(img);
    }

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `<span class="card-tag">${item.cat}</span><button class="like-btn ${liked.has(item.url)?'liked':''}" onclick="event.stopPropagation();toggleLike(this,'${item.url.replace(/'/g,"\\'")}')">♥</button>`;
    card.appendChild(info);
    container.appendChild(card);
  });
}

function showSkeletons(container, count) {
  for (let i=0;i<count;i++) {
    const sk = document.createElement('div');
    sk.className = 'card skeleton';
    sk.style.height = (160 + Math.random() * 160) + 'px';
    container.appendChild(sk);
  }
}
function clearSkeletons(container) {
  container.querySelectorAll('.skeleton').forEach(s => s.remove());
}

function updateCount() {
  document.getElementById('imgCount').textContent = allImages.length + ' 张';
}

// === Lightbox ===
function openLB(idx) {
  lightboxIdx = idx;
  const item = allImages[idx];
  if (!item) return;
  const isVideo = /\.(mp4|webm|mov)$/i.test(item.url);
  document.getElementById('lbContent').innerHTML = isVideo
    ? `<video src="${item.url}" controls autoplay loop style="max-width:92vw;max-height:92vh;border-radius:8px;"></video>`
    : `<img src="${item.url}" alt="">`;
  document.getElementById('lbCounter').textContent = `${idx+1} / ${allImages.length}`;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLB(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lb-nav')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  lightboxIdx = -1;
}
function navLB(dir, e) {
  if (e) e.stopPropagation();
  const n = lightboxIdx + dir;
  if (n >= 0 && n < allImages.length) openLB(n);
}
document.addEventListener('keydown', e => {
  if (lightboxIdx >= 0) {
    if (e.key === 'Escape') closeLB();
    if (e.key === 'ArrowLeft') navLB(-1, e);
    if (e.key === 'ArrowRight') navLB(1, e);
  }
});

// === Like ===
function toggleLike(btn, url) {
  if (liked.has(url)) { liked.delete(url); btn.classList.remove('liked'); }
  else { liked.add(url); btn.classList.add('liked'); }
}

// === Infinite Scroll ===
const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && !loading) loadMore();
}, { threshold: 0.1 });
observer.observe(document.getElementById('sentinel'));

// === Search ===
function onSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.tag').forEach(t => {
    t.style.display = t.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
  document.querySelectorAll('.card').forEach(card => {
    const tag = card.querySelector('.card-tag');
    card.style.display = (tag && tag.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

// === Timeline ===
function buildTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>加载中...</p></div>';
  // Group by category as timeline
  const sample = CATS.slice(0, 12);
  Promise.all(sample.map(cat => fetchImage(cat))).then(urls => {
    container.innerHTML = '';
    sample.forEach((cat, i) => {
      if (!urls[i]) return;
      container.innerHTML += `
        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <h3>📁 ${cat}</h3>
            <div class="mini-grid">
              <img src="${urls[i]}" loading="lazy" onclick="openLB(allImages.findIndex(img=>img.url==='${urls[i].replace(/'/g,"\\'")}'))">
            </div>
          </div>
        </div>`;
    });
  });
}

// === Random Page ===
function loadRandomPage() {
  const container = document.getElementById('randomMasonry');
  container.innerHTML = '';
  const randomCats = CATS.sort(() => Math.random() - 0.5).slice(0, 6);
  loadCategoryBatch(randomCats, 3, container);
}

// === Actions ===
async function shuffleAll() {
  const container = currentPage === 'random' ? document.getElementById('randomMasonry') : document.getElementById('masonry');
  container.innerHTML = '';
  allImages = [];
  const cats = currentCat ? [currentCat] : (currentPage === 'random' ? CATS.sort(()=>Math.random()-0.5).slice(0,6) : HOT_CATS);
  await loadCategoryBatch(cats, 6, container);
}

function clearAll() {
  const container = currentPage === 'random' ? document.getElementById('randomMasonry') : document.getElementById('masonry');
  container.innerHTML = '';
  allImages = [];
  updateCount();
}

// === Theme ===
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.querySelector('.theme-toggle').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) { document.documentElement.setAttribute('data-theme', saved); document.querySelector('.theme-toggle').textContent = saved === 'light' ? '☀️' : '🌙'; }
})();

// === Toast ===
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
</body>
</html>
