<script>
// ====== CONFIG ======
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? `http://localhost:8088/api`
  : `https://img.okva.cc/api`;

// Hefollo real categories (一级分类 from api.hefollo.com)
const CATEGORIES = [
  'AI绘画','优质小姐姐视频','头像','妹子套图','小姐姐视频',
  '手机端-man图片','手机端-动漫图片','手机端-动物图片','手机端-城市图片',
  '手机端-影视图片','手机端-情感图片','手机端-手绘图片','手机端-文字图片',
  '手机端-机械图片','手机端-游戏图片','手机端-物语图片','手机端-美女图片',
  '手机端-视觉图片','手机端-设计图片','手机端-风景图片','手机端壁纸日更',
  '王者荣耀原画壁纸','电脑端-4K图片','电脑端-你的名字图片','电脑端-动漫图片',
  '电脑端-植物图片','电脑端-美女图片','电脑端-谷歌每日图片','抖音',
  '3440X1440壁纸','cos图','cosplay图片','朋友圈背景图','表情包',
  '本人使用壁纸','喵糖映画套图'
];

const PAGE_SIZE = 18;
let currentPage = 0;
let allImages = [];
let lightboxImages = [];
let lightboxIndex = 0;
let likes = {};

// ====== DARK MODE ======
function toggleDark() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('dark', document.documentElement.classList.contains('dark'));
}
if (localStorage.getItem('dark') === 'true' || (!localStorage.getItem('dark') && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
  document.documentElement.classList.add('dark');
}

// ====== PJAX NAVIGATION ======
function navigate(e, page) {
  if (e) e.preventDefault();
  const bar = document.getElementById('nprogress');
  bar.classList.add('loading');
  bar.classList.remove('done');

  document.querySelectorAll('.nav-link').forEach(l => {
    l.classList.remove('bg-pink-50','dark:bg-pink-900/30','text-pink-600','dark:text-pink-400');
    l.classList.add('hover:bg-gray-100','dark:hover:bg-gray-700');
  });
  const active = document.querySelector(`[data-page="${page}"]`);
  if (active) {
    active.classList.add('bg-pink-50','dark:bg-pink-900/30','text-pink-600','dark:text-pink-400');
    active.classList.remove('hover:bg-gray-100','dark:hover:bg-gray-700');
  }

  document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
  const target = document.getElementById('page-' + page);
  if (target) target.classList.remove('hidden');

  setTimeout(() => {
    bar.classList.remove('loading');
    bar.classList.add('done');
    setTimeout(() => bar.classList.remove('done'), 400);
  }, 300);

  if (page === 'home') masonryLayout();
  if (page === 'square') buildSquare();
  if (page === 'archive') buildArchive();
  if (page === 'links') buildLinks();
}

// ====== FETCH IMAGES ======
async function fetchImages(category, count = 30) {
  const encodedCat = encodeURIComponent(category);
  const promises = [];
  for (let i = 0; i < count; i++) {
    promises.push(
      fetch(`${API_BASE}/AllJsonApi.php?type=${encodedCat}`)
        .then(r => r.json())
        .then(data => data.url ? {
          url: data.url,
          thumb: data.url,
          title: category,
          category: category,
          count: Math.floor(Math.random() * 30) + 5
        } : null)
        .catch(() => null)
    );
  }
  const results = await Promise.all(promises);
  return results.filter(Boolean);
}

async function fetchRandom(count = 30) {
  const cat = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  return fetchImages(cat, count);
}

// ====== BUILD CARD HTML ======
function cardHTML(img, index) {
  const id = `img-${index}`;
  return `
    <article class="masonry-item w-6/12 sm:w-4/12 lg:w-3/12 2xl:w-1/5 p-1 sm:p-2 lg:p-2.5 group" data-id="${id}" data-cat="${img.category}" data-title="${img.title}" data-url="${img.url}">
      <div class="relative overflow-hidden rounded-lg bg-white dark:bg-black shadow-lg">
        <a href="#" onclick="openLightbox(event, '${id}')" class="block text-sm text-white">
          <img class="min-h-36 object-cover w-full transition-all duration-500 group-hover:scale-110 lazy"
               src="${img.thumb || img.url}" alt="${img.title}" loading="lazy"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 300 450%22><rect fill=%22%23f1f5f9%22 width=%22300%22 height=%22450%22/><text x=%22150%22 y=%22225%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-size=%2214%22>加载失败</text></svg>'">
          <div class="absolute top-2 -right-full bg-white/90 text-black dark:bg-black/80 dark:text-white py-0.5 px-2 rounded-md transition-all duration-300 group-hover:right-2 text-xs font-medium">
            ${img.count}P
          </div>
          <div class="absolute inset-x-2 -bottom-full backdrop-blur-sm bg-black/50 p-2 rounded-md transition-all duration-300 group-hover:bottom-2">
            <div class="text-xs line-clamp-2">${img.title}</div>
          </div>
        </a>
        <a href="#" onclick="event.stopPropagation();filterByCategory('${img.category}')" class="absolute top-2 left-2 bg-black/50 hover:bg-pink-500/80 text-white rounded-xl text-xs px-2.5 py-0.5 transition-colors">
          ${img.category}
        </a>
      </div>
    </article>`;
}

// ====== MASONRY LAYOUT ======
function masonryLayout() {
  const grid = document.getElementById('masonry-grid');
  if (!grid) return;
  const items = grid.querySelectorAll('.masonry-item');
  if (!items.length) return;

  const gap = 8;
  const containerWidth = grid.offsetWidth;

  let colCount;
  if (containerWidth >= 1536) colCount = 5;
  else if (containerWidth >= 1024) colCount = 4;
  else if (containerWidth >= 640) colCount = 3;
  else colCount = 2;

  const colWidth = (containerWidth - gap * (colCount - 1)) / colCount;
  const colHeights = new Array(colCount).fill(0);

  items.forEach(item => {
    const img = item.querySelector('img');
    const h = img && img.naturalHeight ? (colWidth / img.naturalWidth) * img.naturalHeight : colWidth * 1.5;
    const minIdx = colHeights.indexOf(Math.min(...colHeights));
    item.style.width = colWidth + 'px';
    item.style.left = minIdx * (colWidth + gap) + 'px';
    item.style.top = colHeights[minIdx] + 'px';
    colHeights[minIdx] += h + gap;
  });

  grid.style.height = Math.max(...colHeights) + 'px';
}

// ====== LOAD MORE ======
async function loadInitial() {
  const grid = document.getElementById('masonry-grid');
  grid.innerHTML = '';
  allImages = [];

  const cats = CATEGORIES.sort(() => Math.random() - 0.5).slice(0, 3);
  const fetchPromises = cats.map(cat => fetchImages(cat, 6));
  const results = await Promise.all(fetchPromises);
  results.forEach(imgs => allImages.push(...imgs));

  // Shuffle
  allImages.sort(() => Math.random() - 0.5);
  renderBatch(0, allImages.length);
}

function renderBatch(start, count) {
  const grid = document.getElementById('masonry-grid');
  const batch = allImages.slice(start, start + count);
  const startIdx = start;
  batch.forEach((img, i) => {
    grid.insertAdjacentHTML('beforeend', cardHTML(img, startIdx + i));
  });

  const newItems = grid.querySelectorAll(`.masonry-item:nth-child(n+${start+1})`);
  newItems.forEach(item => {
    item.classList.add('entering');
    requestAnimationFrame(() => {
      item.classList.remove('entering');
    });
  });

  setTimeout(masonryLayout, 100);
}

async function loadMore() {
  const btn = document.getElementById('loadMoreBtn');
  btn.textContent = '加载中…';
  btn.disabled = true;

  const cat = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  const imgs = await fetchImages(cat, 10);
  const prevLen = allImages.length;
  allImages.push(...imgs);
  renderBatch(prevLen, imgs.length);

  btn.textContent = '加载更多';
  btn.disabled = false;
}

// ====== LIGHTBOX ======
function openLightbox(e, id) {
  e.preventDefault();
  const item = document.querySelector(`[data-id="${id}"]`);
  if (!item) return;

  const allItems = [...document.querySelectorAll('.masonry-item')];
  lightboxImages = allItems.map(el => ({
    url: el.dataset.url,
    title: el.dataset.title,
    category: el.dataset.cat,
    id: el.dataset.id
  }));
  lightboxIndex = lightboxImages.findIndex(img => img.id === id);
  updateLightbox();
  document.getElementById('lightbox').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const img = lightboxImages[lightboxIndex];
  if (!img) return;
  document.getElementById('lightboxImg').src = img.url;
  document.getElementById('lightboxCounter').textContent = `${lightboxIndex + 1} / ${lightboxImages.length}`;
  document.getElementById('lightboxLikeCount').textContent = likes[img.id] || 0;
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox')) return;
  document.getElementById('lightbox').classList.add('hidden');
  document.body.style.overflow = '';
}

function lightboxNext() { lightboxIndex = (lightboxIndex + 1) % lightboxImages.length; updateLightbox(); }
function lightboxPrev() { lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length; updateLightbox(); }

function likeCurrent() {
  const img = lightboxImages[lightboxIndex];
  if (!img) return;
  likes[img.id] = (likes[img.id] || 0) + 1;
  document.getElementById('lightboxLikeCount').textContent = likes[img.id];
  document.getElementById('lightboxLike').classList.add('heart-anim');
  setTimeout(() => document.getElementById('lightboxLike').classList.remove('heart-anim'), 800);
}

// ====== FILTER & SEARCH ======
function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.masonry-item').forEach(item => {
    const title = (item.dataset.title || '').toLowerCase();
    const cat = (item.dataset.cat || '').toLowerCase();
    item.style.display = (!q || title.includes(q) || cat.includes(q)) ? '' : 'none';
  });
  setTimeout(masonryLayout, 50);
}

function filterByCategory(cat) {
  document.getElementById('searchInput').value = cat;
  filterCards();
}

// ====== RANDOM POST ======
function randomPost() {
  const visible = [...document.querySelectorAll('.masonry-item')].filter(el => el.style.display !== 'none');
  if (visible.length) {
    const rand = visible[Math.floor(Math.random() * visible.length)];
    openLightbox(new Event('click'), rand.dataset.id);
  }
}

// ====== SQUARE PAGE ======
async function buildSquare() {
  const banner = document.getElementById('bannerSlides');
  const cats = CATEGORIES.slice(0, 5);
  banner.innerHTML = cats.map((c, i) => `
    <div class="absolute inset-0 transition-opacity duration-700 ${i===0?'opacity-100':'opacity-0'}" data-banner="${i}">
      <div class="h-full bg-gradient-to-r ${['from-pink-400 to-rose-500','from-violet-400 to-purple-500','from-blue-400 to-cyan-500','from-emerald-400 to-teal-500','from-amber-400 to-orange-500'][i]} flex items-center justify-center">
        <span class="text-white text-2xl sm:text-4xl font-bold">${c}</span>
      </div>
    </div>
  `).join('');

  let bIdx = 0;
  setInterval(() => {
    document.querySelectorAll('#bannerSlides > div').forEach((d, i) => {
      d.classList.toggle('opacity-100', i === (bIdx + 1) % cats.length);
      d.classList.toggle('opacity-0', i !== (bIdx + 1) % cats.length);
    });
    bIdx = (bIdx + 1) % cats.length;
  }, 3000);

  const tagFilter = document.getElementById('squareTagFilter');
  tagFilter.innerHTML = '<button onclick="filterSquare(\'all\')\" class="px-4 py-1.5 rounded-full bg-pink-500 text-white text-sm font-medium transition-colors sq-tag" data-sqtag="all">全部</button>' +
    CATEGORIES.slice(0, 20).map(c => `<button onclick="filterSquare('${c}')" class="px-4 py-1.5 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 hover:border-pink-300 dark:hover:border-pink-700 text-sm transition-colors sq-tag" data-sqtag="${c}">${c}</button>`).join('');

  const grid = document.getElementById('squareGrid');
  grid.innerHTML = '';
  const imgs = await fetchRandom(24);
  allImages = imgs;
  renderSquare(imgs);
}

function renderSquare(imgs) {
  const grid = document.getElementById('squareGrid');
  grid.innerHTML = imgs.map((img, i) => cardHTML(img, i).replace('masonry-item', '')).join('');
}

async function filterSquare(cat) {
  document.querySelectorAll('.sq-tag').forEach(b => {
    b.classList.toggle('bg-pink-500', b.dataset.sqtag === cat);
    b.classList.toggle('text-white', b.dataset.sqtag === cat);
    b.classList.toggle('bg-white', b.dataset.sqtag !== cat);
    b.classList.toggle('dark:bg-gray-800', b.dataset.sqtag !== cat);
  });
  const imgs = cat === 'all' ? await fetchRandom(24) : await fetchImages(cat, 24);
  renderSquare(imgs);
}

// ====== ARCHIVE PAGE ======
function buildArchive() {
  const list = document.getElementById('archiveList');
  list.innerHTML = CATEGORIES.slice(0, 20).map(c => `
    <div class="flex items-center gap-4 py-4 border-b border-gray-100 dark:border-gray-700 group cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-750 px-3 rounded-lg transition-colors" onclick="filterByCategory('${c}');navigate(event,'home')">
      <div class="w-12 h-12 rounded-full bg-gradient-to-br from-pink-400 to-violet-500 flex items-center justify-center text-white font-bold shrink-0 group-hover:scale-110 transition-transform">${c[0]}</div>
      <div class="flex-1 min-w-0">
        <div class="font-medium">${c}</div>
        <div class="text-xs text-gray-400">${Math.floor(Math.random()*500)+100} 张图片</div>
      </div>
      <svg class="w-4 h-4 text-gray-300 group-hover:text-pink-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
    </div>
  `).join('');
}

// ====== LINKS PAGE ======
function buildLinks() {
  const list = document.getElementById('linksList');
  const links = [
    { name: 'Hefollo 图库', url: 'https://hefollo.com', desc: '高质量图片API服务' },
    { name: '米粒萌图', url: 'https://mili.typecho.fans', desc: 'Typecho 美图主题演示站' },
    { name: '惜染工具箱', url: 'https://meshbit.github.io/my-toolbox/', desc: '98 个在线实用工具' },
    { name: 'GitHub', url: 'https://github.com/meshbit/image-station', desc: '本项目开源仓库' }
  ];
  list.innerHTML = links.map(l => `
    <a href="${l.url}" target="_blank" class="flex items-center gap-4 py-4 px-4 border border-gray-100 dark:border-gray-700 rounded-xl mb-3 hover:shadow-md hover:border-pink-200 dark:hover:border-pink-800 transition-all group">
      <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-pink-100 to-violet-100 dark:from-pink-900/30 dark:to-violet-900/30 flex items-center justify-center text-lg shrink-0 group-hover:scale-110 transition-transform">🔗</div>
      <div class="min-w-0">
        <div class="font-medium group-hover:text-pink-500 transition-colors">${l.name}</div>
        <div class="text-xs text-gray-400">${l.desc}</div>
      </div>
      <svg class="w-4 h-4 text-gray-300 group-hover:text-pink-400 shrink-0 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
    </a>
  `).join('');
}

// ====== INFINITE SCROLL ======
const observer = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && document.getElementById('page-home') && !document.getElementById('page-home').classList.contains('hidden')) {
    loadMore();
  }
}, { threshold: 0.1 });
setTimeout(() => {
  const btn = document.getElementById('loadMoreBtn');
  if (btn) observer.observe(btn);
}, 1000);

// ====== KEYBOARD ======
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (lb.classList.contains('hidden')) return;
  if (e.key === 'ArrowRight') lightboxNext();
  if (e.key === 'ArrowLeft') lightboxPrev();
  if (e.key === 'Escape') closeLightbox();
});

// ====== RESIZE ======
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(masonryLayout, 200);
});

// ====== INIT ======
loadInitial();
</script>
</body>
