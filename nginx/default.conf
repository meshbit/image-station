server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    # Reverse proxy to hefollo API (solves CORS)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass https://hefollo.com;
        proxy_ssl_server_name on;
        proxy_set_header Host hefollo.com;
        proxy_set_header Referer https://hefollo.com/;
        add_header Access-Control-Allow-Origin *;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
